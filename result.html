<!DOCTYPE html>
<html>
<head>
<title>Result</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:black;color:white;text-align:center;font-family:Arial;}

.card{background:#111;padding:20px;border-radius:15px;margin:20px auto;max-width:400px;}

button{padding:12px;border:none;border-radius:10px;background:white;color:black;margin-top:20px;}

canvas{background:white;border-radius:10px;}
</style>
</head>

<body>

<h2>Material Analysis</h2>

<div class="card" id="resultBox"></div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<button onclick="finish()">Finish</button>

<script>

let data=JSON.parse(localStorage.getItem("data"));

let f=parseFloat(data.force);
let a=parseFloat(data.area);
let app=data.app;

let stress=f/a;

const db={
"Automotive":["EN8 Steel",550],
"Aerospace":["Al 7075",500],
"Structural":["40C8 Steel",380],
"Marine":["SS316",290],
"Biomedical":["Ti-6Al-4V",817],
"Tooling":["D2 Steel",700],
"Thermal":["Copper C110",220],
"Electrical":["Al 6061",310],
"Heavy Load":["EN24 Steel",850],
"Lightweight":["Mg AZ31",260]
};

let m=db[app];

let strength=m[1];

document.getElementById("resultBox").innerHTML=
"Material: "+m[0]+"<br>Stress: "+stress.toFixed(2)+" MPa<br>Strength: "+strength+" MPa";

new Chart(chart,{
type:'bar',
data:{labels:['Stress','Strength'],datasets:[{data:[stress,strength]}]}
});

function finish(){
window.location.href="return.html";
}

</script>

</body>
</html>
