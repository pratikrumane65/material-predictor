<!DOCTYPE html>
<html>
<head>
<title>Material Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

.card {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  margin: 20px auto;
  max-width: 400px;
}

canvas {
  background: white;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>📊 Material Analysis</h1>

<div class="card" id="resultBox"></div>

<div class="card">
<h2>1. Stress vs Yield Strength</h2>
<canvas id="chart1"></canvas>
</div>

<p>~AVCOE, Roll no {69 70 71 72}</p>

<script>

// SAFE LOAD
let raw = localStorage.getItem("data");

if (!raw) {
  document.body.innerHTML = "<h2>No data found</h2>";
  throw new Error("No data");
}

const data = JSON.parse(raw);

let f = data.force;
let a = data.area;
let app = data.app;

let stress = f / a;

// ✅ REAL MATERIAL GRADES
let material, strength, reason;

if(app=="Automotive"){
  material="EN8 Medium Carbon Steel";
  strength=550;
  reason="Used in shafts & gears";
}
else if(app=="Aerospace"){
  material="Aluminium 7075-T6";
  strength=500;
  reason="High strength lightweight alloy";
}
else if(app=="Structural"){
  material="Plain Carbon Steel 40C8";
  strength=380;
  reason="Common structural steel";
}
else if(app=="Marine"){
  material="Stainless Steel 316";
  strength=290;
  reason="Corrosion resistant";
}
else if(app=="Biomedical"){
  material="Titanium Ti-6Al-4V ELI";
  strength=817;
  reason="Biocompatible implant material";
}
else if(app=="Tooling"){
  material="D2 Tool Steel";
  strength=700;
  reason="High wear resistance";
}
else if(app=="Thermal"){
  material="Copper Alloy C110 (Electrolytic Tough Pitch)";
  strength=220;
  reason="Excellent thermal conductivity";
}
else if(app=="Electrical"){
  material="Aluminium 6061-T6";
  strength=310;
  reason="Good electrical conductivity";
}
else if(app=="Heavy Load"){
  material="EN24 Alloy Steel";
  strength=850;
  reason="High strength under heavy load";
}
else if(app=="Lightweight"){
  material="Magnesium AZ31 Alloy";
  strength=260;
  reason="Ultra lightweight";
}

// calculation
let status = (strength / stress) > 2 ? "✅ Safe" : "❌ Not Safe";

// OUTPUT (❌ FOS REMOVED)
document.getElementById("resultBox").innerHTML = `
Material: ${material}<br>
Yield Strength: ${strength} MPa<br>
Applied Stress: ${stress.toFixed(2)} MPa<br>
Status: ${status}<br><br>
Reason: ${reason}
`;

// GRAPH
new Chart(document.getElementById("chart1"), {
  type: 'bar',
  data: {
    labels: ['Applied Stress', 'Yield Strength'],
    datasets: [{
      label: 'MPa',
      data: [stress, strength]
    }]
  }
});

</script>

</body>
</html>
