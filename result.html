<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Material Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

.bg{
  position:fixed;
  inset:0;
  background:
  linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)),
  url('https://images.unsplash.com/photo-1581091215367-59ab6b4a3a85');
  background-size:cover;
  z-index:-1;
}

.card{
  background:rgba(0,0,0,0.7);
  padding:20px;
  border-radius:15px;
  margin:20px auto;
  max-width:420px;
}

.label{font-weight:bold;font-size:20px;}
.value{font-size:18px;}

canvas{
  background:white;
  border-radius:10px;
  margin-top:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:white;
  color:black;
  margin-top:20px;
}

.safe{color:#00ff88;}
.fail{color:#ff4444;}
</style>
</head>

<body>

<div class="bg"></div>

<h2>🚀 Advanced Material Analysis Dashboard</h2>

<div class="card" id="mainResult"></div>

<div class="card">
<h3>🏆 Top 3 Suggested Materials</h3>
<div id="top3"></div>
</div>

<div class="card">
<h3>📊 Ashby Chart (Strength vs Density)</h3>
<canvas id="ashby"></canvas>
</div>

<div class="card">
<h3>📈 Stress vs Strength</h3>
<canvas id="c1"></canvas>
</div>

<div class="card">
<h3>📈 Temperature Effect</h3>
<canvas id="c2"></canvas>
</div>

<div class="card">
<h3>📈 Safety Margin</h3>
<canvas id="c3"></canvas>
</div>

<button onclick="finish()">Finish</button>

<script>

// INPUT
let data = JSON.parse(localStorage.getItem("data"));
let f = parseFloat(data.force);
let a = parseFloat(data.area);
let t = parseFloat(data.temp || 25);

let stress = f/a;

// MATERIAL DB
const materials = [
{name:"EN8 Steel", strength:550, density:7850},
{name:"Al 7075-T6", strength:500, density:2810},
{name:"40C8 Steel", strength:380, density:7850},
{name:"SS316", strength:290, density:8000},
{name:"Ti-6Al-4V", strength:817, density:4430},
{name:"D2 Steel", strength:700, density:7700},
{name:"Copper C110", strength:220, density:8960},
{name:"Al 6061", strength:310, density:2700},
{name:"EN24 Steel", strength:850, density:7850},
{name:"Mg AZ31", strength:260, density:1770}
];

// AI SCORE FUNCTION
function score(m){
let s = m.strength;
let d = m.density;
let eff = s/d;

let tempEffect = s*(1-0.002*(t-25));

return (eff*1000) + tempEffect - stress;
}

// SORT MATERIALS
materials.forEach(m => m.score = score(m));
materials.sort((a,b)=>b.score-a.score);

// TOP 3
let top3 = materials.slice(0,3);

// MAIN RESULT
let best = top3[0];

let status = best.strength > stress ? "SAFE" : "FAIL";

document.getElementById("mainResult").innerHTML = `
<b>Best Material:</b><br>${best.name}<br><br>
Stress: ${stress.toFixed(2)} MPa<br>
Strength: ${best.strength} MPa<br>
AI Score: ${best.score.toFixed(2)}<br>
Status: <span class="${status=='SAFE'?'safe':'fail'}">${status}</span>
`;

// SHOW TOP 3
document.getElementById("top3").innerHTML = top3.map((m,i)=>
`${i+1}. ${m.name} (Score: ${m.score.toFixed(1)})`
).join("<br>");

// ASHBY CHART
new Chart(ashby,{
type:'scatter',
data:{
datasets:[{
label:"Materials",
data:materials.map(m=>({x:m.density,y:m.strength}))
}]
},
options:{
scales:{
x:{title:{display:true,text:"Density"}},
y:{title:{display:true,text:"Strength"}}
}
}
});

// GRAPH 1
new Chart(c1,{
type:'bar',
data:{
labels:['Stress','Best Strength'],
datasets:[{data:[stress,best.strength]}]
}
});

// GRAPH 2
new Chart(c2,{
type:'line',
data:{
labels:[25,100,200,300],
datasets:[{
data:[
best.strength,
best.strength*0.9,
best.strength*0.8,
best.strength*0.7
]
}]
}
});

// GRAPH 3
new Chart(c3,{
type:'bar',
data:{
labels:['Margin'],
datasets:[{data:[best.strength-stress]}]
}
});

function finish(){
window.location.href="return.html";
}

</script>

</body>
</html>
