<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:black;color:white;text-align:center;padding:20px;}
.box{background:#111;padding:20px;border-radius:15px;margin-top:20px;}
canvas{background:white;border-radius:10px;margin-top:10px;}
.footer{margin-top:30px;color:#aaa;}
</style>
</head>

<body>

<h2>📊 Material Analysis</h2>

<div id="result" class="box"></div>

<div class="box">
<h3>1. Stress vs Yield Strength</h3>
<canvas id="c1"></canvas>
</div>

<div class="box">
<h3>2. Safety Evaluation (FOS)</h3>
<canvas id="c2"></canvas>
</div>

<div class="box">
<h3>3. Stress Line Behaviour</h3>
<canvas id="c3"></canvas>
</div>

<div class="footer">~AVCOE, Roll no {69,70,71,72}</div>

<script>
let url=new URLSearchParams(window.location.search);

let f=parseFloat(url.get("f"));
let a=parseFloat(url.get("a"));
let t=parseFloat(url.get("t"));
let app=url.get("app");

let stress=f/a; // σ = F/A

let material,strength,reason;

// LOGIC
if(app=="Heavy Load"){
material="EN24";
strength=850;
reason="High strength required for heavy load.";
}
else if(app=="Aerospace"){
material="Ti-6Al-4V";
strength=817;
reason="Lightweight + high strength.";
}
else if(app=="Marine"){
material="SS316";
strength=290;
reason="Corrosion resistance required.";
}
else if(app=="Automotive"){
material="EN8";
strength=465;
reason="Balanced strength & cost.";
}
else{
material="Al 7075";
strength=500;
reason="Lightweight application.";
}

// TEMPERATURE EFFECT
if(t>200){
strength*=0.8;
reason+=" High temperature reduces strength.";
}

let fos=(strength/stress).toFixed(2);

// SAFETY STATUS
let status="";
if(fos<1) status="❌ Failure";
else if(fos<2) status="⚠ Risk";
else status="✅ Safe";

document.getElementById("result").innerHTML=`
<b>Formula:</b> σ = F/A<br><br>
<b>Material:</b> ${material}<br>
<b>Yield Strength:</b> ${strength.toFixed(2)} MPa<br>
<b>Applied Stress:</b> ${stress.toFixed(2)} MPa<br>
<b>FOS:</b> ${fos}<br>
<b>Status:</b> ${status}<br><br>
<b>Reason:</b> ${reason}
`;

// GRAPH 1
new Chart(document.getElementById("c1"),{
type:"bar",
data:{labels:["Stress","Strength"],
datasets:[{data:[stress,strength]}]}
});

// GRAPH 2
new Chart(document.getElementById("c2"),{
type:"bar",
data:{labels:["FOS"],
datasets:[{data:[fos]}]}
});

// GRAPH 3
new Chart(document.getElementById("c3"),{
type:"line",
data:{labels:["Start","Failure"],
datasets:[{data:[stress,strength]}]}
});
</script>

</body>
</html>
