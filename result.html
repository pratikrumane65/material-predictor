<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material Analysis</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

/* SAME BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,150,255,0.25), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(180,0,255,0.25), transparent 40%),
    radial-gradient(circle at 50% 90%, rgba(0,255,200,0.15), transparent 40%),
    linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)),
    url('https://images.unsplash.com/photo-1581091215367-59ab6b4a3a85');
  background-size:cover;
  z-index:-1;
}

/* CARD */
.card{
  background:rgba(20,20,20,0.8);
  padding:25px;
  border-radius:15px;
  margin:25px auto;
  max-width:420px;
  box-shadow:0 0 15px rgba(0,150,255,0.2);
}

/* TEXT */
.title{
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
  text-shadow:0 0 10px rgba(0,150,255,0.6);
}

.value{
  font-size:18px;
  margin:5px 0;
}

/* GRAPH */
canvas{
  background:white;
  border-radius:10px;
  margin-top:10px;
}

/* BUTTON */
button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00c6ff,#7b2ff7);
  color:white;
  margin-top:20px;
}

/* FOOTER */
.footer{
  color:#aaa;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="bg"></div>

<h2>📊 Material Analysis</h2>

<div class="card" id="resultBox"></div>

<div class="card">
<h3>Stress vs Strength</h3>
<canvas id="c1"></canvas>
</div>

<button onclick="finish()">Finish</button>

<div class="footer">
~AVCOE, Roll no {69 70 71 72}
</div>

<script>

// INPUT
let data = JSON.parse(localStorage.getItem("data"));

let f = parseFloat(data.force);
let a = parseFloat(data.area);
let stress = f/a;

// MATERIAL DB
const materials = [
{name:"Plain Carbon Steel (40C8)", strength:380},
{name:"Medium Carbon Steel (EN8)", strength:550},
{name:"Alloy Steel (EN24)", strength:850},
{name:"Aluminium Alloy (7075-T6)", strength:500},
{name:"Titanium Alloy (Ti-6Al-4V)", strength:817}
];

// SELECT BEST
let best = materials.reduce((a,b)=> a.strength>b.strength?a:b);

// OUTPUT
document.getElementById("resultBox").innerHTML = `
<div class="title">${best.name}</div>
<div class="value">Stress: ${stress.toFixed(2)} MPa</div>
<div class="value">Strength: ${best.strength} MPa</div>
`;

// GRAPH
new Chart(c1,{
type:'bar',
data:{labels:['Stress','Strength'],datasets:[{data:[stress,best.strength]}]}
});

// FINISH
function finish(){
window.location.href="return.html";
}
</script>

</body>
</html>
