<!DOCTYPE html>
<html>
<head>
<title>Result</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:black;color:white;text-align:center;font-family:Arial;}

.card{
  background:#111;
  padding:20px;
  border-radius:15px;
  margin:20px auto;
  max-width:400px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:white;
  color:black;
  margin-top:20px;
}

canvas{
  background:white;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>Material Analysis</h2>

<div class="card" id="resultBox"></div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<button onclick="finish()">Finish</button>

<script>

let data=JSON.parse(localStorage.getItem("data"));

let f=parseFloat(data.force);
let a=parseFloat(data.area);
let app=data.app;

let stress=f/a;

const db={
"Automotive":["Medium Carbon Steel (EN8)",550],
"Aerospace":["Aluminium Alloy (7075-T6)",500],
"Structural":["Plain Carbon Steel (40C8)",380],
"Marine":["Stainless Steel (SS316)",290],
"Biomedical":["Titanium Alloy (Ti-6Al-4V)",817],
"Tooling":["Tool Steel (D2)",700],
"Thermal":["Copper Alloy (C110)",220],
"Electrical":["Aluminium Alloy (6061)",310],
"Heavy Load":["Alloy Steel (EN24)",850],
"Lightweight":["Magnesium Alloy (AZ31)",260]
};

let m=db[app];

let strength=m[1];

document.getElementById("resultBox").innerHTML=
"<b>Material:</b> "+m[0]+"<br>"+
"<b>Stress:</b> "+stress.toFixed(2)+" MPa<br>"+
"<b>Strength:</b> "+strength+" MPa";

new Chart(chart,{
type:'bar',
data:{labels:['Stress','Strength'],datasets:[{data:[stress,strength]}]}
});

function finish(){
window.location.href="return.html";
}

</script>

</body>
</html>
