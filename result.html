<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
  padding: 20px;
}

.box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  margin: 15px auto;
  max-width: 400px;
  animation: fade 1s ease;
}

canvas {
  background: white;
  border-radius: 10px;
  margin-top: 20px;
}

@keyframes fade {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<h2>📊 Material Result</h2>

<div class="box" id="output"></div>

<canvas id="c1"></canvas>
<canvas id="c2"></canvas>
<canvas id="c3"></canvas>

<script>
// GET DATA
let url = new URLSearchParams(window.location.search);
let f = parseFloat(url.get("f"));
let a = parseFloat(url.get("a"));
let t = parseFloat(url.get("t"));
let app = url.get("app");

// CALCULATIONS
let stress = f/a;

let material="", strength=0, cost=0;

if(app=="Aerospace"){
  material="Titanium Alloy"; strength=900; cost=1500;
}
else if(app=="Automotive"){
  material="Aluminium Alloy"; strength=300; cost=800;
}
else{
  material="Mild Steel"; strength=250; cost=400;
}

let fos = (strength/stress).toFixed(2);

// OUTPUT
document.getElementById("output").innerHTML = `
<b>Material:</b> ${material}<br>
<b>Stress:</b> ${stress.toFixed(2)}<br>
<b>FOS:</b> ${fos}<br>
<b>Estimated Cost:</b> ₹${cost}
`;

// GRAPH 1
new Chart(document.getElementById("c1"), {
  type:'bar',
  data:{
    labels:['Stress','Strength'],
    datasets:[{
      label:'Material Data',
      data:[stress,strength]
    }]
  },
  options:{animation:{duration:1500}}
});

// GRAPH 2
new Chart(document.getElementById("c2"), {
  type:'line',
  data:{
    labels:['Applied','Limit'],
    datasets:[{
      label:'Failure Check',
      data:[stress,strength]
    }]
  },
  options:{animation:{duration:1500}}
});

// GRAPH 3
new Chart(document.getElementById("c3"), {
  type:'pie',
  data:{
    labels:['Material Cost','Extra'],
    datasets:[{
      data:[cost, 2000-cost]
    }]
  },
  options:{animation:{duration:1500}}
});
</script>

</body>
</html>
