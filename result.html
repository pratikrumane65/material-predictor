<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
  padding: 20px;
}

.box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  margin: 15px auto;
  max-width: 400px;
}

canvas {
  background: white;
  border-radius: 10px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>📊 Material Result</h2>

<div class="box" id="output"></div>

<canvas id="c1"></canvas>
<canvas id="c2"></canvas>
<canvas id="c3"></canvas>

<script>

// GET DATA
let url = new URLSearchParams(window.location.search);

let f = parseFloat(url.get("f"));
let a = parseFloat(url.get("a"));
let t = parseFloat(url.get("t"));
let app = url.get("app").split(",");

// CALCULATE STRESS
let stress = f / a;

// MATERIAL LOGIC
let material = "";
let baseStrength = 0;
let baseCost = 0;

if(app.includes("Aerospace")){
  material = "Titanium Alloy";
  baseStrength = 900;
  baseCost = 1500;
}
else if(app.includes("Automotive")){
  material = "Aluminium Alloy";
  baseStrength = 320;
  baseCost = 800;
}
else if(app.includes("Structural")){
  material = "Mild Steel";
  baseStrength = 250;
  baseCost = 400;
}
else if(app.includes("Marine")){
  material = "Stainless Steel";
  baseStrength = 500;
  baseCost = 900;
}
else{
  material = "Composite Material";
  baseStrength = 700;
  baseCost = 1200;
}

// AI EFFECT
let tempFactor = 1 - (t / 1000);
let stressFactor = 1 - (stress / 1000);

let strength = baseStrength * tempFactor * stressFactor;

// FOS
let fos = (strength / stress).toFixed(2);

// COST
let cost = baseCost + (t * 2) + (stress * 5);

// OUTPUT
document.getElementById("output").innerHTML = `
<b>Material:</b> ${material}<br>
<b>Strength:</b> ${strength.toFixed(2)}<br>
<b>Stress:</b> ${stress.toFixed(2)}<br>
<b>FOS:</b> ${fos}<br>
<b>Estimated Cost:</b> ₹${Math.round(cost)}
`;

// GRAPH 1
new Chart(document.getElementById("c1"), {
  type:'bar',
  data:{
    labels:['Stress','Strength'],
    datasets:[{
      label:'Comparison',
      data:[stress,strength]
    }]
  }
});

// GRAPH 2
new Chart(document.getElementById("c2"), {
  type:'line',
  data:{
    labels:['Applied','Limit'],
    datasets:[{
      label:'Failure Check',
      data:[stress,strength]
    }]
  }
});

// GRAPH 3
new Chart(document.getElementById("c3"), {
  type:'pie',
  data:{
    labels:['Material Cost','Extra'],
    datasets:[{
      data:[cost, 3000-cost]
    }]
  }
});

</script>

</body>
</html>
