<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material Result</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial;
  background:black;
  color:white;
  text-align:center;
  padding:20px;
}

.box{
  background:#111;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

canvas{
  background:white;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>📊 Material Analysis</h2>

<div id="result" class="box"></div>

<div class="box">
<h3>1. Stress vs Strength</h3>
<canvas id="c1"></canvas>
</div>

<div class="box">
<h3>2. Failure Curve</h3>
<canvas id="c2"></canvas>
</div>

<div class="box">
<h3>3. Factor of Safety</h3>
<canvas id="c3"></canvas>
</div>

<p style="margin-top:30px;">~AVCOE, Roll no {69,70,71,72}</p>

<script>
let url = new URLSearchParams(window.location.search);

let f = parseFloat(url.get("f"));
let a = parseFloat(url.get("a"));
let t = parseFloat(url.get("t"));
let app = url.get("app");

let stress = f/a;

// MATERIAL LOGIC (technical names)
let material, strength;

if(app=="Automotive"){
  material="EN8 (080M40)";
  strength=465;
}
else if(app=="Aerospace"){
  material="Ti-6Al-4V ELI";
  strength=817;
}
else if(app=="Structural"){
  material="Fe410 Structural Steel";
  strength=250;
}
else if(app=="Marine"){
  material="SS316";
  strength=290;
}
else if(app=="Biomedical"){
  material="Ti Grade 2";
  strength=350;
}
else if(app=="Tooling"){
  material="D2 Tool Steel";
  strength=700;
}
else if(app=="Thermal"){
  material="Copper Alloy";
  strength=210;
}
else if(app=="Electrical"){
  material="Aluminium 6061";
  strength=310;
}
else if(app=="Heavy Load"){
  material="EN24";
  strength=850;
}
else{
  material="Aluminium 7075";
  strength=500;
}

let fos = (strength/stress).toFixed(2);

// SHOW RESULT
document.getElementById("result").innerHTML = `
<b>Material:</b> ${material}<br>
<b>Yield Strength:</b> ${strength} MPa<br>
<b>Applied Stress:</b> ${stress.toFixed(2)} MPa<br>
<b>FOS:</b> ${fos}
`;

// GRAPH 1
new Chart(document.getElementById("c1"),{
type:"bar",
data:{
labels:["Stress","Strength"],
datasets:[{
data:[stress,strength]
}]
}
});

// GRAPH 2
new Chart(document.getElementById("c2"),{
type:"line",
data:{
labels:["Start","Failure"],
datasets:[{
data:[stress,strength]
}]
}
});

// GRAPH 3
new Chart(document.getElementById("c3"),{
type:"bar",
data:{
labels:["FOS"],
datasets:[{
data:[fos]
}]
}
});
</script>

</body>
</html>
