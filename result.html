<!DOCTYPE html>
<html>
<head>
<title>Material Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

.card {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  margin: 20px auto;
  max-width: 420px;
}

canvas {
  background: white;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>📊 Material Analysis</h1>

<div class="card" id="resultBox"></div>

<div class="card">
<h2>1. Stress vs Yield Strength</h2>
<canvas id="c1"></canvas>
</div>

<div class="card">
<h2>2. Specific Strength (Strength/Density)</h2>
<canvas id="c2"></canvas>
</div>

<div class="card">
<h2>3. Strength vs Temperature</h2>
<canvas id="c3"></canvas>
</div>

<div class="card">
<h2>4. Safety Margin</h2>
<canvas id="c4"></canvas>
</div>

<p>~AVCOE, Roll no {69 70 71 72}</p>

<script>

// LOAD DATA
let raw = localStorage.getItem("data");
if (!raw) {
  document.body.innerHTML = "<h2>No data found</h2>";
  throw "error";
}

const data = JSON.parse(raw);

let f = data.force;
let a = data.area;
let temp = data.temp || 25;
let app = data.app;

let stress = f / a;

// MATERIAL DB (REALISTIC)
const matDB = {
  "Automotive": {name:"EN8 Steel", strength:550, density:7850},
  "Aerospace": {name:"Al 7075-T6", strength:500, density:2810},
  "Structural": {name:"40C8 Steel", strength:380, density:7850},
  "Marine": {name:"SS 316", strength:290, density:8000},
  "Biomedical": {name:"Ti-6Al-4V", strength:817, density:4430},
  "Tooling": {name:"D2 Steel", strength:700, density:7700},
  "Thermal": {name:"Copper C110", strength:220, density:8960},
  "Electrical": {name:"Al 6061", strength:310, density:2700},
  "Heavy Load": {name:"EN24 Steel", strength:850, density:7850},
  "Lightweight": {name:"Mg AZ31", strength:260, density:1770}
};

let m = matDB[app];

let strength = m.strength;
let density = m.density;

// temp effect (simple engineering assumption)
let strength_temp = strength * (1 - 0.002*(temp-25));

// OUTPUT
document.getElementById("resultBox").innerHTML = `
Material: ${m.name}<br>
Yield Strength: ${strength} MPa<br>
Density: ${density} kg/m³<br>
Applied Stress: ${stress.toFixed(2)} MPa<br>
Temp Adjusted Strength: ${strength_temp.toFixed(2)} MPa
`;

// 1️⃣ Stress vs Strength
new Chart(c1, {
  type: 'bar',
  data: {
    labels: ['Stress', 'Strength'],
    datasets: [{ data: [stress, strength] }]
  }
});

// 2️⃣ Specific strength
new Chart(c2, {
  type: 'bar',
  data: {
    labels: ['Selected Material'],
    datasets: [{
      label: "Strength/Density",
      data: [(strength/density)]
    }]
  }
});

// 3️⃣ Strength vs temperature
new Chart(c3, {
  type: 'line',
  data: {
    labels: [25,100,200,300],
    datasets: [{
      label: "Strength",
      data: [
        strength,
        strength*0.9,
        strength*0.8,
        strength*0.7
      ]
    }]
  }
});

// 4️⃣ Safety margin
new Chart(c4, {
  type: 'bar',
  data: {
    labels: ['Margin'],
    datasets: [{
      data: [strength - stress]
    }]
  }
});

</script>

</body>
</html>
