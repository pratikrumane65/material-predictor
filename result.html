<!DOCTYPE html>
<html>
<head>
<title>Material Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

.card {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  margin: 20px auto;
  max-width: 400px;
}

canvas {
  background: white;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>📊 Material Analysis</h1>

<div class="card" id="resultBox"></div>

<div class="card">
<h2>1. Stress vs Yield Strength</h2>
<canvas id="chart1"></canvas>
</div>

<div class="card">
<h2>2. Safety Evaluation (FOS)</h2>
<canvas id="chart2"></canvas>
</div>

<p>~AVCOE, Roll no {69 70 71 72}</p>

<script>

// 🔒 SAFE LOAD
let raw = localStorage.getItem("data");

if (!raw) {
  document.body.innerHTML = "<h2>No data found. Go back.</h2>";
  throw new Error("No data");
}

const data = JSON.parse(raw);

let f = data.force;
let a = data.area;
let app = data.app;

let stress = f / a;

// ✅ SPECIFIC MATERIALS
let material, strength, reason;

if(app=="Automotive"){
  material="EN8 Steel"; strength=550; reason="Automotive shafts";
}
else if(app=="Aerospace"){
  material="Aluminium 7075-T6"; strength=500; reason="Lightweight";
}
else if(app=="Structural"){
  material="40C8 Steel"; strength=380; reason="General structure";
}
else if(app=="Marine"){
  material="SS 316"; strength=290; reason="Corrosion resistant";
}
else if(app=="Biomedical"){
  material="Ti-6Al-4V"; strength=817; reason="Biocompatible";
}
else if(app=="Tooling"){
  material="D2 Tool Steel"; strength=700; reason="Wear resistant";
}
else if(app=="Thermal"){
  material="Copper Alloy"; strength=220; reason="Heat transfer";
}
else if(app=="Electrical"){
  material="Al 6061"; strength=310; reason="Conductivity";
}
else if(app=="Heavy Load"){
  material="EN24 Steel"; strength=850; reason="Heavy load";
}
else if(app=="Lightweight"){
  material="Magnesium AZ31"; strength=260; reason="Very light";
}

// calc
let fos = (strength / stress).toFixed(2);
let status = fos > 2 ? "✅ Safe" : "❌ Not Safe";

// OUTPUT
document.getElementById("resultBox").innerHTML = `
Material: ${material}<br>
Yield Strength: ${strength} MPa<br>
Applied Stress: ${stress.toFixed(2)} MPa<br>
FOS: ${fos}<br>
Status: ${status}<br><br>
Reason: ${reason}
`;

// GRAPH 1
new Chart(document.getElementById("chart1"), {
  type: 'bar',
  data: {
    labels: ['Stress', 'Yield'],
    datasets: [{
      label: 'MPa',
      data: [stress, strength]
    }]
  }
});

// GRAPH 2
new Chart(document.getElementById("chart2"), {
  type: 'bar',
  data: {
    labels: ['FOS'],
    datasets: [{
      label: 'Safety',
      data: [fos]
    }]
  }
});

</script>

</body>
</html>
