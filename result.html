<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

.box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  max-width: 400px;
  margin: auto;
}

canvas {
  background: white;
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>📊 Material Analysis</h2>

<div class="box" id="out"></div>

<canvas id="c1"></canvas>
<canvas id="c2"></canvas>
<canvas id="c3"></canvas>

<script>

// INPUT
let url = new URLSearchParams(window.location.search);
let f = parseFloat(url.get("f"));
let a = parseFloat(url.get("a"));
let t = parseFloat(url.get("t"));
let app = url.get("app");

// STRESS
let stress = f/a;

// MATERIAL DATABASE (REAL TYPE)
let material, yieldStrength;

if(app=="Automotive"){
  material="EN8 / 40C8 Steel"; yieldStrength=400;
}
else if(app=="Aerospace"){
  material="Ti-6Al-4V Titanium"; yieldStrength=900;
}
else if(app=="Structural"){
  material="Mild Steel (Fe250)"; yieldStrength=250;
}
else if(app=="Marine"){
  material="SS316 Stainless Steel"; yieldStrength=520;
}
else if(app=="Biomedical"){
  material="Ti-6Al-4V ELI"; yieldStrength=860;
}
else if(app=="Tooling"){
  material="H13 Tool Steel"; yieldStrength=1000;
}
else if(app=="Thermal"){
  material="Aluminium 6061"; yieldStrength=275;
}
else if(app=="Electrical"){
  material="Copper Alloy"; yieldStrength=210;
}
else if(app=="Heavy Load"){
  material="EN24 Alloy Steel"; yieldStrength=850;
}
else{
  material="Carbon Fiber Composite"; yieldStrength=600;
}

// TEMP EFFECT
let tempFactor = 1 - (t/1000);
let finalStrength = yieldStrength * tempFactor;

// FOS
let fos = (finalStrength/stress).toFixed(2);

// OUTPUT
document.getElementById("out").innerHTML = `
<b>Material:</b> ${material}<br>
<b>Yield Strength:</b> ${finalStrength.toFixed(2)} MPa<br>
<b>Applied Stress:</b> ${stress.toFixed(2)} MPa<br>
<b>Factor of Safety:</b> ${fos}
`;

// GRAPH 1 → Stress vs Strength
new Chart(document.getElementById("c1"), {
  type:'bar',
  data:{
    labels:['Stress','Yield Strength'],
    datasets:[{
      label:'Stress Comparison',
      data:[stress, finalStrength]
    }]
  }
});

// GRAPH 2 → Failure Line
new Chart(document.getElementById("c2"), {
  type:'line',
  data:{
    labels:['Start','Failure Point'],
    datasets:[{
      label:'Failure Curve',
      data:[stress, finalStrength]
    }]
  }
});

// GRAPH 3 → FOS Visualization
new Chart(document.getElementById("c3"), {
  type:'bar',
  data:{
    labels:['FOS'],
    datasets:[{
      label:'Safety',
      data:[fos]
    }]
  }
});

</script>

<footer style="
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 13px;
  color: gray;
">
  ~AVCOE, Roll no {69,70,71,72}
</footer>

</body>
</html>
