<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Result</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
  padding: 20px;
}

.box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  margin: 15px auto;
  max-width: 400px;
  animation: fade 1s ease;
}

canvas {
  background: white;
  border-radius: 10px;
  margin-top: 20px;
}

@keyframes fade {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<h2>🤖 AI Material Analysis</h2>

<div class="box" id="output"></div>

<canvas id="c1"></canvas>
<canvas id="c2"></canvas>
<canvas id="c3"></canvas>

<script>
// GET INPUT
let url = new URLSearchParams(window.location.search);
let f = parseFloat(url.get("f"));
let a = parseFloat(url.get("a"));
let t = parseFloat(url.get("t"));
let app = url.get("app");

// STRESS
let stress = f / a;

// 🔥 AI-LIKE MODEL (dynamic logic)
let baseStrength, material, baseCost;

// Application based base values
if(app=="Aerospace"){
  baseStrength = 850;
  material = "Titanium Alloy";
  baseCost = 1500;
}
else if(app=="Automotive"){
  baseStrength = 320;
  material = "Aluminium Alloy";
  baseCost = 800;
}
else{
  baseStrength = 260;
  material = "Mild Steel";
  baseCost = 400;
}

// Temperature effect (AI behavior)
let tempFactor = 1 - (t / 1000);   // high temp → reduce strength

// Stress effect (AI behavior)
let stressFactor = 1 - (stress / 1000);

// FINAL PREDICTED STRENGTH
let predictedStrength = baseStrength * tempFactor * stressFactor;

// COST ESTIMATION (AI style)
let cost = baseCost + (t * 2) + (stress * 5);

// FOS
let fos = (predictedStrength / stress).toFixed(2);

// OUTPUT
document.getElementById("output").innerHTML = `
<b>Material:</b> ${material}<br>
<b>Predicted Strength:</b> ${predictedStrength.toFixed(2)}<br>
<b>Stress:</b> ${stress.toFixed(2)}<br>
<b>FOS:</b> ${fos}<br>
<b>Estimated Cost:</b> ₹${Math.round(cost)}
`;

// GRAPH 1
new Chart(document.getElementById("c1"), {
  type:'bar',
  data:{
    labels:['Stress','Strength'],
    datasets:[{
      label:'Comparison',
      data:[stress,predictedStrength]
    }]
  },
  options:{animation:{duration:1500}}
});

// GRAPH 2
new Chart(document.getElementById("c2"), {
  type:'line',
  data:{
    labels:['Applied','Limit'],
    datasets:[{
      label:'Failure Risk',
      data:[stress,predictedStrength]
    }]
  },
  options:{animation:{duration:1500}}
});

// GRAPH 3
new Chart(document.getElementById("c3"), {
  type:'pie',
  data:{
    labels:['Material Cost','Extra'],
    datasets:[{
      data:[cost, 3000-cost]
    }]
  },
  options:{animation:{duration:1500}}
});
</script>

</body>
</html>
