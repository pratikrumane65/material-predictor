<!DOCTYPE html>
<html>
<head>
<title>Material Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
  padding: 20px;
}

.card {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  margin: 20px auto;
  max-width: 400px;
}

canvas {
  background: white;
  border-radius: 10px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>📊 Material Analysis</h1>

<div class="card" id="resultBox"></div>

<div class="card">
<h2>1. Stress vs Yield Strength</h2>
<canvas id="chart1"></canvas>
</div>

<div class="card">
<h2>2. Safety Evaluation (FOS)</h2>
<canvas id="chart2"></canvas>
</div>

<p style="margin-top:30px;">~AVCOE, Roll no {69 70 71 72}</p>

<script>
const data = JSON.parse(localStorage.getItem("data"));

let f = data.force;
let a = data.area;
let app = data.app;

let stress = f / a;

// ✅ Specific materials
let material, strength, reason;

if(app=="Automotive"){
  material = "EN8 Steel";
  strength = 550;
  reason = "Good strength & machinability";
}
else if(app=="Aerospace"){
  material = "Aluminium 7075-T6";
  strength = 500;
  reason = "High strength, lightweight";
}
else if(app=="Structural"){
  material = "40C8 Carbon Steel";
  strength = 380;
  reason = "Strong & economical";
}
else if(app=="Marine"){
  material = "Stainless Steel 316";
  strength = 290;
  reason = "Corrosion resistance";
}
else if(app=="Biomedical"){
  material = "Ti-6Al-4V ELI";
  strength = 817;
  reason = "Biocompatible";
}
else if(app=="Tooling"){
  material = "D2 Tool Steel";
  strength = 700;
  reason = "Wear resistant";
}
else if(app=="Thermal"){
  material = "Copper Alloy C110";
  strength = 220;
  reason = "High conductivity";
}
else if(app=="Electrical"){
  material = "Aluminium 6061";
  strength = 310;
  reason = "Good conductor";
}
else if(app=="Heavy Load"){
  material = "EN24 Alloy Steel";
  strength = 850;
  reason = "High load capacity";
}
else if(app=="Lightweight"){
  material = "Magnesium AZ31";
  strength = 260;
  reason = "Ultra lightweight";
}

// calculations
let fos = (strength / stress).toFixed(2);
let status = fos > 2 ? "✅ Safe" : "❌ Not Safe";

// ❌ Removed formula line here
document.getElementById("resultBox").innerHTML = `
Material: ${material}<br>
Yield Strength: ${strength.toFixed(2)} MPa<br>
Applied Stress: ${stress.toFixed(2)} MPa<br>
FOS: ${fos}<br>
Status: ${status}<br><br>
Reason: ${reason}
`;

// Chart 1
new Chart(document.getElementById("chart1"), {
  type: 'bar',
  data: {
    labels: ['Stress', 'Yield Strength'],
    datasets: [{
      label: 'MPa',
      data: [stress, strength]
    }]
  }
});

// Chart 2
new Chart(document.getElementById("chart2"), {
  type: 'bar',
  data: {
    labels: ['FOS'],
    datasets: [{
      label: 'Safety',
      data: [fos]
    }]
  }
});
</script>

</body>
</html>
