<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Material Predictor</title>

<style>
body {
  font-family: Arial;
  background: #000;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  max-width: 400px;
  margin: auto;
  animation: fade 1s ease;
}

input, select {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 8px;
  border: none;
}

button {
  width: 90%;
  padding: 12px;
  background: white;
  color: black;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

@keyframes fade {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<h2>🤖 AI Material Predictor</h2>

<div class="container">
  <input id="force" placeholder="Force (N)">
  <input id="area" placeholder="Area (mm²)">
  <input id="temp" placeholder="Temperature (°C)">

  <select id="app">
    <option>Automotive</option>
    <option>Aerospace</option>
    <option>Structural</option>
  </select>

  <button onclick="go()">Predict</button>
</div>

<script>
function go(){
  let f = document.getElementById("force").value;
  let a = document.getElementById("area").value;
  let t = document.getElementById("temp").value;
  let app = document.getElementById("app").value;

  window.open(
    `result.html?f=${f}&a=${a}&t=${t}&app=${app}`,
    "_blank"
  );
}
</script>

</body>
</html>
