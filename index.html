<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Material Predictor</title>

<style>
body{
  font-family: Arial;
  background:black;
  color:white;
  text-align:center;
  padding:20px;
}

.container{
  background:#111;
  padding:20px;
  border-radius:15px;
  max-width:350px;
  margin:auto;
}

input, select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:#ccc;
  border:none;
  border-radius:10px;
  font-size:16px;
}
</style>
</head>

<body>

<h2>⚙️ Smart Material Selection & Analysis System</h2>

<div class="container">

<input id="force" placeholder="Force (N)">
<input id="area" placeholder="Area (mm²)">
<input id="temp" placeholder="Temperature (°C)">

<label>Select Application</label>

<select id="app" size="5" style="background:#000;color:#fff;">
  <option>Automotive</option>
  <option>Aerospace</option>
  <option>Structural</option>
  <option>Marine</option>
  <option>Biomedical</option>
  <option>Tooling</option>
  <option>Thermal</option>
  <option>Electrical</option>
  <option>Heavy Load</option>
  <option>Lightweight</option>
</select>

<button onclick="go()">Predict</button>

</div>

<script>
function go(){
  let f = document.getElementById("force").value;
  let a = document.getElementById("area").value;
  let t = document.getElementById("temp").value;
  let app = document.getElementById("app").value;

  window.location.href =
    "result.html?f="+f+"&a="+a+"&t="+t+"&app="+app;
}
</script>

</body>
</html>
