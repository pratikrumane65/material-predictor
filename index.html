<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material System</title>

<style>
body{
  font-family: Arial;
  background:black;
  color:white;
  text-align:center;
  padding:20px;
}

.container{
  background:#111;
  padding:20px;
  border-radius:15px;
  max-width:350px;
  margin:auto;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

/* RADIO STYLE */
.opt{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0;
  font-size:16px;
}

.opt input{
  transform:scale(1.2);
}

/* SCROLL BOX */
.scroll-box{
  text-align:left;
  max-height:220px;
  overflow-y:auto;
  padding:10px;
  border-radius:10px;
  background:#000;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:#ccc;
  border:none;
  border-radius:10px;
  font-size:16px;
  margin-top:15px;
}
</style>
</head>

<body>

<h2>⚙️ Smart Material Selection & Analysis System</h2>

<div class="container">

<input id="force" placeholder="Force (N)">
<input id="area" placeholder="Area (mm²)">
<input id="temp" placeholder="Temperature (°C)">

<label style="margin-top:10px;display:block;">Select Application</label>

<div class="scroll-box">

<label class="opt"><input type="radio" name="app" value="Automotive"> Automotive</label>
<label class="opt"><input type="radio" name="app" value="Aerospace"> Aerospace</label>
<label class="opt"><input type="radio" name="app" value="Structural"> Structural</label>
<label class="opt"><input type="radio" name="app" value="Marine"> Marine</label>
<label class="opt"><input type="radio" name="app" value="Biomedical"> Biomedical</label>
<label class="opt"><input type="radio" name="app" value="Tooling"> Tooling</label>
<label class="opt"><input type="radio" name="app" value="Thermal"> Thermal</label>
<label class="opt"><input type="radio" name="app" value="Electrical"> Electrical</label>
<label class="opt"><input type="radio" name="app" value="Heavy Load"> Heavy Load</label>
<label class="opt"><input type="radio" name="app" value="Lightweight"> Lightweight</label>

</div>

<button onclick="go()">Predict</button>

</div>

<script>
function go(){

  let f = document.getElementById("force").value;
  let a = document.getElementById("area").value;
  let t = document.getElementById("temp").value;

  let selected = document.querySelector('input[name="app"]:checked');

  if(!selected){
    alert("Please select application");
    return;
  }

  let app = selected.value;

  window.location.href =
    "result.html?f="+f+"&a="+a+"&t="+t+"&app="+app;
}
</script>

</body>
</html>
