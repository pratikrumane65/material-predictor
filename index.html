<!DOCTYPE html>
<html>
<head>
<title>Smart Material Selection & Analysis System</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;

  /* BACKGROUND IMAGE */
  background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.9)),
  url('https://images.unsplash.com/photo-1581091215367-59ab6b4a3a85');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* MAIN CARD */
.container {
  background: rgba(0,0,0,0.75);
  padding: 20px;
  border-radius: 15px;
  max-width: 420px;
  margin: 60px auto;
  backdrop-filter: blur(10px);
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  font-size: 15px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: white;
  color: black;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  text-align: center;
  padding: 10px;
  font-size: 14px;
  color: #aaa;
  background: rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<h1>⚙️ Smart Material Selection & Analysis System</h1>

<div class="container">

<input id="force" placeholder="Force (N)">
<input id="area" placeholder="Area (mm²)">
<input id="temp" placeholder="Temperature (°C)">

<select id="app">
  <option value="">Select Application</option>
  <option>Automotive</option>
  <option>Aerospace</option>
  <option>Structural</option>
  <option>Marine</option>
  <option>Biomedical</option>
  <option>Tooling</option>
  <option>Thermal</option>
  <option>Electrical</option>
  <option>Heavy Load</option>
  <option>Lightweight</option>
</select>

<button onclick="run()">Predict</button>

</div>

<div class="footer">
~AVCOE, Roll no {69 70 71 72}
</div>

<script>
function run(){

let f = document.getElementById("force").value;
let a = document.getElementById("area").value;
let t = document.getElementById("temp").value;
let app = document.getElementById("app").value;

if(!f || !a || !app){
  alert("Enter all values");
  return;
}

/* STORE DATA */
localStorage.setItem("data", JSON.stringify({
  force: f,
  area: a,
  temp: t,
  app: app
}));

/* OPEN RESULT PAGE */
window.open("result.html","_blank");

}
</script>

</body>
</html>
