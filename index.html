<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Material Predictor</title>

<style>
body {
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  max-width: 400px;
  margin: auto;
}

input {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 8px;
  border: none;
}

button {
  width: 90%;
  padding: 12px;
  background: white;
  color: black;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

.app-box {
  text-align: left;
  margin: 10px;
}

.app-box label {
  display: block;
  margin: 5px;
}
</style>
</head>

<body>

<h2>🤖 AI Material Predictor</h2>

<div class="container">

<input id="force" placeholder="Force (N)">
<input id="area" placeholder="Area (mm²)">
<input id="temp" placeholder="Temperature (°C)">

<div class="app-box">
  <label><input type="checkbox" value="Automotive"> Automotive</label>
  <label><input type="checkbox" value="Aerospace"> Aerospace</label>
  <label><input type="checkbox" value="Structural"> Structural</label>
  <label><input type="checkbox" value="Marine"> Marine</label>
  <label><input type="checkbox" value="Biomedical"> Biomedical</label>
</div>

<button onclick="go()">Predict</button>

</div>

<script>
function go(){

  let f = document.getElementById("force").value;
  let a = document.getElementById("area").value;
  let t = document.getElementById("temp").value;

  let selected = [];
  document.querySelectorAll('.app-box input:checked').forEach(el=>{
    selected.push(el.value);
  });

  if(selected.length === 0){
    alert("Select at least one application");
    return;
  }

  let app = selected.join(",");

  window.open(
    `result.html?f=${f}&a=${a}&t=${t}&app=${app}`,
    "_blank"
  );
}
</script>

</body>
</html>
