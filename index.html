<style>
body{
  margin:0;

  background:black;
  color:white;

/* Background */
.bg{
  position:fixed;
  inset:0;
  background:

/* Main box */
.container{
  margin:20px auto;
  max-width:400px;
  background:#111;
  padding:20px;

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:white;
  color:black;
  font-size:16px;

  max-width:400px;
  background:#111;
  padding:20px;
  border-radius:15px;
  text-align:left;
}

.about h3{
  text-align:center;
}

/* Footer */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  padding:10px;
  color:#aaa;
  background:#000;
}
