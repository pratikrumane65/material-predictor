<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material Predictor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  text-align: center;
  padding: 20px;
}

.container {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 15px;
  max-width: 350px;
  margin: auto;
  box-shadow: 0 0 10px rgba(255,255,255,0.1);
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  background: #333;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  background: #fff;
  color: #000;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
}

button:hover {
  background: #ddd;
}
</style>
</head>

<body>

<h2>⚙ Smart Material Predictor</h2>

<div class="container">

<input id="force" placeholder="Force (N)">
<input id="area" placeholder="Area (mm²)">
<input id="temp" placeholder="Temperature (°C)">

<select id="app">
<option>Automotive</option>
<option>Aerospace</option>
<option>Structural</option>
</select>

<button onclick="run()">Predict</button>

</div>

<script>

function run(){

let f = parseFloat(document.getElementById("force").value);
let a = parseFloat(document.getElementById("area").value);
let t = parseFloat(document.getElementById("temp").value);
let app = document.getElementById("app").value;

let stress = f/a;

let material="", strength=0, cost=0;

if(app==="Aerospace" || t>300){
  material="Titanium Alloy"; strength=900; cost=1500;
}
else if(app==="Automotive"){
  material="Aluminum Alloy"; strength=300; cost=800;
}
else{
  material="Mild Steel"; strength=250; cost=400;
}

let fos = (strength/stress).toFixed(2);


// 🔥 OPEN NEW PAGE
let newPage = window.open("", "_blank");

newPage.document.write(`
<html>
<head>
<title>Result</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background:#000;
  color:#fff;
  font-family:Arial;
  text-align:center;
}
.box {
  background:#111;
  margin:20px;
  padding:20px;
  border-radius:10px;
}
canvas {
  background:#fff;
  border-radius:10px;
  margin-top:20px;
}
</style>
</head>

<body>

<h2>Material Result</h2>

<div class="box">
Material: ${material}<br>
Stress: ${stress.toFixed(2)}<br>
FOS: ${fos}<br>
Cost: ₹${cost}
</div>

<canvas id="c1"></canvas>
<canvas id="c2"></canvas>
<canvas id="c3"></canvas>

<script>

new Chart(document.getElementById("c1"), {
type:'bar',
data:{
labels:['Stress','Strength'],
datasets:[{data:[${stress},${strength}]}]
}
});

new Chart(document.getElementById("c2"), {
type:'line',
data:{
labels:['Applied','Limit'],
datasets:[{data:[${stress},${strength}]}]
}
});

new Chart(document.getElementById("c3"), {
type:'pie',
data:{
labels:['Selected','Alt'],
datasets:[{data:[${cost},${cost+500}]}]
}
});

<\/script>

</body>
</html>
`);

}
</script>

</body>
</html>
