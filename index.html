<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material Project</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:black;
  overflow-x:hidden;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)),
    url('https://images.unsplash.com/photo-1581091215367-59ab6b4a3a85');
  background-size:cover;
  z-index:-1;
}

/* TITLE (SHIFTED UP) */
#title{
  margin-top:14vh;
  font-size:28px;
  white-space:nowrap;
  overflow:hidden;
  border-right:3px solid white;
  width:0;
  animation:
    typing 3s steps(40,end) forwards,
    blink 0.7s infinite;
}

@keyframes typing{
  from{width:0}
  to{width:100%}
}

@keyframes blink{
  50%{border-color:transparent}
}

/* CARD */
.container{
  background:rgba(0,0,0,0.7);
  padding:20px;
  border-radius:15px;
  max-width:400px;
  margin:25px auto;
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 1s ease forwards;
  animation-delay:3s;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:white;
  color:black;
  font-size:16px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  background:#ddd;
}

/* ABOUT */
.about{
  margin:40px auto 80px;
  max-width:400px;
  background:rgba(0,0,0,0.7);
  padding:20px;
  border-radius:15px;
  text-align:left;
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 1s ease forwards;
  animation-delay:3.5s;
}

/* GUIDED BY (CENTER BELOW NAMES) */
.guide{
  margin-top:20px;
  text-align:center;
  font-size:16px;
  color:#ccc;
}

/* ANIMATION */
@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  padding:10px;
  color:#aaa;
  background:black;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- TITLE -->
<h1 id="title">⚙️ Smart Material Selection & Analysis System</h1>

<div class="container">
<button onclick="openApp()">Calculate</button>
</div>

<div class="about">
<h3 style="text-align:center;">About Us</h3>

<p>1. Pawar Subham Raju (469)</p>
<p>2. Rumane Pratik Dnyaneshwar (470)</p>
<p>3. Ayan Shaikh (471)</p>
<p>4. Anjali Shinde (472)</p>

<!-- ✅ GUIDED BY CENTERED BELOW -->
<div class="guide">
Guided by ~ Dr. K. Dagale
</div>

</div>

<div class="footer">
Amrutvahini College of Engineering, Sangamner
</div>

<script>
function openApp(){
  window.location.href="main.html";
}
</script>

</body>
</html>
