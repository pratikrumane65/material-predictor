<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Material Predictor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #000;
  color: #fff;
  text-align: center;
  padding: 20px;
}

.container {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  max-width: 350px;
  margin: auto;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  background: #222;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  background: #fff;
  color: #000;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: #111;
  border-radius: 10px;
}

canvas {
  margin-top: 20px;
  background: white;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>⚙ Smart Material Predictor</h2>

<div class="container">

<input id="force" placeholder="Force (N)">
<input id="area" placeholder="Area (mm²)">
<input id="temp" placeholder="Temperature (°C)">

<select id="app">
<option>Automotive</option>
<option>Aerospace</option>
<option>Structural</option>
</select>

<button onclick="run()">Predict</button>

<div id="output" class="result"></div>

<canvas id="c1"></canvas>
<canvas id="c2"></canvas>
<canvas id="c3"></canvas>

</div>

<script>

let chart1, chart2, chart3;

function run(){

let f = parseFloat(document.getElementById("force").value);
let a = parseFloat(document.getElementById("area").value);
let t = parseFloat(document.getElementById("temp").value);
let app = document.getElementById("app").value;

if(isNaN(f) || isNaN(a)){
  alert("Enter valid values");
  return;
}

let stress = f/a;

let material="", strength=0, cost=0;

if(app==="Aerospace" || t>300){
  material="Titanium Alloy"; strength=900; cost=1500;
}
else if(app==="Automotive"){
  material="Aluminum Alloy"; strength=300; cost=800;
}
else{
  material="Mild Steel"; strength=250; cost=400;
}

let fos = (strength/stress).toFixed(2);

// ✅ FIXED OUTPUT
document.getElementById("output").innerHTML = `
<b>Material:</b> ${material}<br>
<b>Stress:</b> ${stress.toFixed(2)}<br>
<b>FOS:</b> ${fos}<br>
<b>Cost:</b> ₹${cost}
`;


// GRAPH 1
if(chart1) chart1.destroy();
chart1 = new Chart(document.getElementById("c1"), {
  type: 'bar',
  data: {
    labels: ['Stress','Strength'],
    datasets: [{
      data: [stress, strength]
    }]
  }
});

// GRAPH 2
if(chart2) chart2.destroy();
chart2 = new Chart(document.getElementById("c2"), {
  type: 'line',
  data: {
    labels: ['Applied','Limit'],
    datasets: [{
      data: [stress, strength]
    }]
  }
});

// GRAPH 3
if(chart3) chart3.destroy();
chart3 = new Chart(document.getElementById("c3"), {
  type: 'pie',
  data: {
    labels: ['Selected','Alternative'],
    datasets: [{
      data: [cost, cost+500]
    }]
  }
});

}

</script>

</body>
</html>
