<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material System</title>

<style>
body{
  font-family: Arial;
  background:black;
  color:white;
  text-align:center;
  padding:20px;
}

.container{
  background:#111;
  padding:20px;
  border-radius:15px;
  max-width:350px;
  margin:auto;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:#ccc;
  border:none;
  border-radius:10px;
  font-size:16px;
  margin-top:15px;
}

#selectedBox{
  padding:12px;
  background:#000;
  border-radius:10px;
  cursor:pointer;
}

#appList{
  display:none;
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  max-height:60%;
  background:#000;
  overflow-y:auto;
  border-radius:20px 20px 0 0;
  padding:20px;
}

.item{
  padding:15px;
  border-bottom:1px solid #333;
  font-size:18px;
}

.item:hover{
  background:#222;
}

/* FOOTER */
.footer{
  margin-top:25px;
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>

<h2>⚙️ Smart Material Selection & Analysis System</h2>

<div class="container">

<input id="force" placeholder="Force (N)">
<input id="area" placeholder="Area (mm²)">
<input id="temp" placeholder="Temperature (°C)">

<label style="margin-top:10px;display:block;">Select Application</label>

<div id="selectedBox" onclick="openList()">
  Select Application ▼
</div>

<button onclick="go()">Predict</button>

</div>

<!-- FOOTER TEXT -->
<div class="footer">
  ~AVCOE, Roll no {69,70,71,72}
</div>

<!-- POPUP LIST -->
<div id="appList">

<div onclick="selectApp('Automotive')" class="item">Automotive</div>
<div onclick="selectApp('Aerospace')" class="item">Aerospace</div>
<div onclick="selectApp('Structural')" class="item">Structural</div>
<div onclick="selectApp('Marine')" class="item">Marine</div>
<div onclick="selectApp('Biomedical')" class="item">Biomedical</div>
<div onclick="selectApp('Tooling')" class="item">Tooling</div>
<div onclick="selectApp('Thermal')" class="item">Thermal</div>
<div onclick="selectApp('Electrical')" class="item">Electrical</div>
<div onclick="selectApp('Heavy Load')" class="item">Heavy Load</div>
<div onclick="selectApp('Lightweight')" class="item">Lightweight</div>

</div>

<script>
let selectedApp = "";

function openList(){
  document.getElementById("appList").style.display = "block";
}

function selectApp(val){
  selectedApp = val;
  document.getElementById("selectedBox").innerHTML = val + " ▼";
  document.getElementById("appList").style.display = "none";
}

function go(){
  let f = document.getElementById("force").value;
  let a = document.getElementById("area").value;
  let t = document.getElementById("temp").value;

  if(!selectedApp){
    alert("Select application");
    return;
  }

  window.location.href =
    "result.html?f="+f+"&a="+a+"&t="+t+"&app="+selectedApp;
}
</script>

</body>
</html>
