<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material Project</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:black;

  /* ✅ PERFECT CENTER */
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,150,255,0.25), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(180,0,255,0.25), transparent 40%),
    radial-gradient(circle at 50% 90%, rgba(0,255,200,0.15), transparent 40%),
    linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)),
    url('https://images.unsplash.com/photo-1581091215367-59ab6b4a3a85');
  background-size:cover;
  z-index:-1;
}

/* TITLE */
h1{
  font-size:26px;
  margin-bottom:30px;
  text-shadow:0 0 10px rgba(0,150,255,0.6);
}

/* CARD */
.container{
  background:rgba(20,20,20,0.85);
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:350px;
  box-shadow:0 0 15px rgba(0,150,255,0.2);
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00c6ff,#7b2ff7);
  color:white;
  font-size:16px;
}
</style>
</head>

<body>

<div class="bg"></div>

<h1>⚙️ Smart Material Selection & Analysis System</h1>

<div class="container">
  <button onclick="openApp()">Calculate</button>
</div>

<script>
function openApp(){
  window.location.href="main.html";
}
</script>

</body>
</html>
