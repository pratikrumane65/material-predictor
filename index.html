<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Material Selection & Analysis System</title>

<style>
:root{
  --bg:#000;
  --card:#111;
  --accent:#eaeaea;
}

/* RESET */
*{box-sizing:border-box}
body{
  margin:0;
  font-family: Arial, sans-serif;
  color:#fff;
  text-align:center;
  overflow-x:hidden;
  background:#000;
}

/* 🎬 ANIMATED BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(1200px 600px at 10% 10%, rgba(255,255,255,0.06), transparent 60%),
    radial-gradient(900px 500px at 90% 20%, rgba(255,255,255,0.05), transparent 60%),
    radial-gradient(800px 500px at 50% 90%, rgba(255,255,255,0.04), transparent 60%),
    linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)),
    url('https://images.unsplash.com/photo-1581091215367-59ab6b4a3a85');
  background-size: cover;
  background-position:center;
  filter: contrast(110%) saturate(90%);
  animation: drift 20s ease-in-out infinite alternate;
  z-index:-1;
}
@keyframes drift{
  0%{transform:scale(1) translateY(0)}
  100%{transform:scale(1.05) translateY(-10px)}
}

/* CARD */
.container{
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.08);
  padding:20px;
  border-radius:16px;
  max-width:420px;
  margin:70px auto 100px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* INPUTS */
input, select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  font-size:15px;
  background:#0f0f0f;
  color:#fff;
}

/* 🔘 BUTTON (ripple + hover) */
button{
  position:relative;
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
  color:#000;
  background:var(--accent);
  cursor:pointer;
  overflow:hidden;
  transition: transform .15s ease, box-shadow .15s ease;
}
button:hover{
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(255,255,255,0.15);
}
button:active{
  transform: translateY(0);
}

/* ripple */
.ripple{
  position:absolute;
  border-radius:50%;
  transform: scale(0);
  animation: ripple .6s linear;
  background: rgba(0,0,0,0.3);
}
@keyframes ripple{
  to{ transform: scale(4); opacity:0; }
}

/* ⏳ LOADER OVERLAY */
.loader{
  position:fixed;
  inset:0;
  background: rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}
.spinner{
  width:50px;height:50px;
  border:5px solid #333;
  border-top:5px solid #fff;
  border-radius:50%;
  animation: spin 1s linear infinite;
}
@keyframes spin{
  to{ transform: rotate(360deg); }
}
.loader p{
  margin-top:15px;
  font-size:16px;
  color:#ccc;
}

/* FOOTER (fixed) */
.footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:10px;
  font-size:14px;
  color:#aaa;
  background: rgba(0,0,0,0.75);
  border-top:1px solid #222;
}
</style>
</head>

<body>

<div class="bg"></div>

<h1>⚙️ Smart Material Selection & Analysis System</h1>

<div class="container">
  <input id="force" placeholder="Force (N)">
  <input id="area" placeholder="Area (mm²)">
  <input id="temp" placeholder="Temperature (°C)">

  <select id="app">
    <option value="">Select Application</option>
    <option>Automotive</option>
    <option>Aerospace</option>
    <option>Structural</option>
    <option>Marine</option>
    <option>Biomedical</option>
    <option>Tooling</option>
    <option>Thermal</option>
    <option>Electrical</option>
    <option>Heavy Load</option>
    <option>Lightweight</option>
  </select>

  <button id="predictBtn" onclick="run(event)">Predict</button>
</div>

<!-- LOADER -->
<div class="loader" id="loader">
  <div>
    <div class="spinner"></div>
    <p>Analyzing material...</p>
  </div>
</div>

<div class="footer">
  ~AVCOE, Roll no {69 70 71 72}
</div>

<script>
function run(e){
  // ripple effect
  const btn = e.currentTarget;
  const circle = document.createElement("span");
  const diameter = Math.max(btn.clientWidth, btn.clientHeight);
  const rect = btn.getBoundingClientRect();
  circle.style.width = circle.style.height = diameter + "px";
  circle.style.left = (e.clientX - rect.left - diameter/2) + "px";
  circle.style.top = (e.clientY - rect.top - diameter/2) + "px";
  circle.classList.add("ripple");
  btn.appendChild(circle);
  setTimeout(()=>circle.remove(),600);

  // read inputs
  let f = document.getElementById("force").value;
  let a = document.getElementById("area").value;
  let t = document.getElementById("temp").value;
  let app = document.getElementById("app").value;

  if(!f || !a || !app){
    alert("Enter all values");
    return;
  }

  // save
  localStorage.setItem("data", JSON.stringify({
    force: f, area: a, temp: t, app: app
  }));

  // show loader then open
  const loader = document.getElementById("loader");
  loader.style.display = "flex";

  setTimeout(()=>{
    window.open("result.html","_blank");
    loader.style.display = "none";
  }, 1000);
}
</script>

</body>
</html>
