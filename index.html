<!DOCTYPE html>
<html>
<head>
<title>Material Selection</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 20px;
  margin: 0;
}

.card {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  max-width: 400px;
  margin: auto;
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

button {
  background: white;
  cursor: pointer;
}

select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
}

/* ✅ FIXED FOOTER */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: black;
  padding: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<h1>⚙️ Smart Material Selection & Analysis System</h1>

<div class="card">

<input id="force" placeholder="Force (N)">
<input id="area" placeholder="Area (mm²)">
<input id="temp" placeholder="Temperature (°C)">

<select id="app">
<option value="">Select Application</option>
<option>Automotive</option>
<option>Aerospace</option>
<option>Structural</option>
<option>Marine</option>
<option>Biomedical</option>
<option>Tooling</option>
<option>Thermal</option>
<option>Electrical</option>
<option>Heavy Load</option>
<option>Lightweight</option>
</select>

<button onclick="goNext()">Predict</button>

</div>

<!-- ✅ ALWAYS VISIBLE FOOTER -->
<div class="footer">
~AVCOE, Roll no {69 70 71 72}
</div>

<script>
function goNext() {

  let force = parseFloat(document.getElementById("force").value);
  let area = parseFloat(document.getElementById("area").value);
  let temp = parseFloat(document.getElementById("temp").value);
  let app = document.getElementById("app").value;

  if (!force || !area || !app) {
    alert("Fill all fields");
    return;
  }

  let data = {
    force: force,
    area: area,
    temp: temp,
    app: app
  };

  localStorage.setItem("data", JSON.stringify(data));

  window.open("result.html", "_blank");
}
</script>

</body>
</html>
