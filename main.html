<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material Input</title>

<style>
:root{
  --bg:#000;
  --card:#111;
  --accent:#eaeaea;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial;
  color:#fff;
  text-align:center;
  background:#000;
}

/* Background */
.bg{
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)),
    url('https://images.unsplash.com/photo-1581091215367-59ab6b4a3a85');
  background-size:cover;
  background-position:center;
  z-index:-1;
}

/* Card */
.container{
  background:rgba(0,0,0,0.7);
  padding:20px;
  border-radius:15px;
  max-width:420px;
  margin:80px auto;
}

/* Inputs */
input, select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
}

/* Button */
button{
  position:relative;
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:16px;
  background:#fff;
  color:#000;
  cursor:pointer;
  overflow:hidden;
}

/* Ripple */
.ripple{
  position:absolute;
  border-radius:50%;
  transform:scale(0);
  animation:ripple .6s linear;
  background:rgba(0,0,0,0.3);
}
@keyframes ripple{
  to{transform:scale(4);opacity:0;}
}

/* Loader */
.loader{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}
.spinner{
  width:50px;height:50px;
  border:5px solid #333;
  border-top:5px solid #fff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  to{transform:rotate(360deg);}
}

/* Footer */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  padding:10px;
  color:#aaa;
  background:#000;
}
</style>
</head>

<body>

<div class="bg"></div>

<h2>📊 Enter Input Values</h2>

<div class="container">

<input id="force" placeholder="Force (N)">
<input id="area" placeholder="Area (mm²)">
<input id="temp" placeholder="Temperature (°C)">

<select id="app">
<option value="">Select Application</option>
<option>Automotive</option>
<option>Aerospace</option>
<option>Structural</option>
<option>Marine</option>
<option>Biomedical</option>
<option>Tooling</option>
<option>Thermal</option>
<option>Electrical</option>
<option>Heavy Load</option>
<option>Lightweight</option>
</select>

<button onclick="run(event)">Predict</button>

</div>

<!-- Loader -->
<div class="loader" id="loader">
  <div>
    <div class="spinner"></div>
    <p>Processing...</p>
  </div>
</div>

<div class="footer">
~AVCOE, Roll no {69 70 71 72}
</div>

<script>
function run(e){

  // Ripple
  const btn = e.currentTarget;
  const circle = document.createElement("span");
  const diameter = Math.max(btn.clientWidth, btn.clientHeight);
  const rect = btn.getBoundingClientRect();
  circle.style.width = circle.style.height = diameter + "px";
  circle.style.left = (e.clientX - rect.left - diameter/2) + "px";
  circle.style.top = (e.clientY - rect.top - diameter/2) + "px";
  circle.classList.add("ripple");
  btn.appendChild(circle);
  setTimeout(()=>circle.remove(),600);

  let f = document.getElementById("force").value;
  let a = document.getElementById("area").value;
  let t = document.getElementById("temp").value;
  let app = document.getElementById("app").value;

  if(!f || !a || !app){
    alert("Enter all values");
    return;
  }

  localStorage.setItem("data", JSON.stringify({
    force:f, area:a, temp:t, app:app
  }));

  document.getElementById("loader").style.display="flex";

  setTimeout(()=>{
    window.open("result.html","_blank");
    document.getElementById("loader").style.display="none";
  },1000);
}
</script>

</body>
</html>
