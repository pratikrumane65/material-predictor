<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input</title>

<style>
body{margin:0;font-family:Arial;background:black;color:white;text-align:center;}
.bg{position:fixed;inset:0;background:linear-gradient(rgba(0,0,0,0.9),rgba(0,0,0,0.95)),url('https://images.unsplash.com/photo-1581091215367-59ab6b4a3a85');background-size:cover;z-index:-1;}

.container{background:#111;padding:20px;border-radius:15px;max-width:400px;margin:80px auto;}

input,select{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;}

button{width:100%;padding:12px;border:none;border-radius:10px;background:white;color:black;}

.footer{position:fixed;bottom:0;width:100%;padding:10px;color:#aaa;background:#000;}
</style>
</head>

<body>

<div class="bg"></div>

<h2>Enter Values</h2>

<div class="container">

<input id="force" placeholder="Force (N)">
<input id="area" placeholder="Area (mm²)">
<input id="temp" placeholder="Temperature (°C)">

<select id="app">
<option value="">Select Application</option>
<option>Automotive</option>
<option>Aerospace</option>
<option>Structural</option>
<option>Marine</option>
<option>Biomedical</option>
<option>Tooling</option>
<option>Thermal</option>
<option>Electrical</option>
<option>Heavy Load</option>
<option>Lightweight</option>
</select>

<button onclick="run()">Predict</button>

</div>

<div class="footer">
~AVCOE Roll no {69 70 71 72}
</div>

<script>
function run(){
let f=document.getElementById("force").value;
let a=document.getElementById("area").value;
let t=document.getElementById("temp").value;
let app=document.getElementById("app").value;

if(!f||!a||!app){alert("Enter all values");return;}

localStorage.setItem("data",JSON.stringify({force:f,area:a,temp:t,app:app}));

window.location.href="result.html";
}
</script>

</body>
</html>
